version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      # Random cron (monthly) instead of interval: monthly, per ioBroker suggestion
      # S8906, to distribute load on the GitHub infrastructure.
      interval: cron
      cronjob: "23 4 11 * *"
      timezone: Europe/Berlin
    open-pull-requests-limit: 15
    assignees:
      - Creekhail
    versioning-strategy: increase
    cooldown:
      default-days: 7
    ignore:
      # Keep @types/node aligned with the supported Node.js runtime; do not bump majors automatically.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: cron
      cronjob: "41 5 17 * *"
      timezone: Europe/Berlin
    open-pull-requests-limit: 15
    assignees:
      - Creekhail
    cooldown:
      default-days: 7
